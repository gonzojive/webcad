name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  statuses: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'

    - name: Register Checks
      run: ./devtool github-ci register --name "Check devtool tidy results in no diff" --name "Check bazel build //..." --name "Check bazel test //..." --sha "${{ github.event.pull_request.head.sha || github.sha }}"

    - name: Set up Bazel
      uses: bazelbuild/setup-bazelisk@v3

    # Mount Bazel cache directories to persist them across runs (inter-run caching).
    # Modelled after the meta-programming/rules_runfiles_codegen pattern.
    - name: Mount Bazel Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/bazel-disk
          ~/.cache/bazel-repo
        # Use a unique key per run to force saving the updated cache,
        # but restore the most recent cache for this OS.
        key: bazel-cache-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          bazel-cache-${{ runner.os }}-

    - name: Configure Shared Bazel Cache
      run: |
        mkdir -p ~/.cache/bazel-disk
        mkdir -p ~/.cache/bazel-repo
        echo "build --disk_cache=~/.cache/bazel-disk" >> ~/.bazelrc
        echo "build --repository_cache=~/.cache/bazel-repo" >> ~/.bazelrc

    - name: Check devtool tidy results in no diff
      run: ./devtool github-ci run-check --name "Check devtool tidy results in no diff" --sha "${{ github.event.pull_request.head.sha || github.sha }}" --preregistered -- ./devtools/tidy && git diff --exit-code

    - name: Check bazel build //...
      run: ./devtool github-ci run-check --name "Check bazel build //..." --sha "${{ github.event.pull_request.head.sha || github.sha }}" --preregistered -- bazel build //...

    - name: Check bazel test //...
      run: ./devtool github-ci run-check --name "Check bazel test //..." --sha "${{ github.event.pull_request.head.sha || github.sha }}" --preregistered -- bazel test //...

  validate-docs:
    name: Validate Markdown and Diagrams
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run md-mermaid-lint
      run: npx md-mermaid-lint "**/*.md"
