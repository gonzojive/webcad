name: "Lint PR"

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read
  statuses: write

jobs:
  main:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # When updating this list of allowed types, please also update the prefixes in .agents/AGENTS.md
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            revert
            release
            productivity
