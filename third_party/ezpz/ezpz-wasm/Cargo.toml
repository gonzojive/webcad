[package]
name = "ezpz-wasm"
version = "0.1.0"
edition = "2024"
repository = "https://github.com/KittyCAD/ezpz"
description = "Wasm bindings for the ezpz constraint solver"
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]
bench = false

[dependencies]
faer = { version = "0.24.0", default-features = false, features = ["std", "sparse-linalg"] }
ezpz = { path = "../ezpz" }
wasm-bindgen = "0.2"
