[package]
name = "ezpz-cli"
version = "0.1.0"
edition = "2024"
repository = "https://github.com/KittyCAD/ezpz"
description = "CLI for using the ezpz constraint solver"
license = "MIT"
publish = false

[[bin]]
path = "src/main.rs"
name = "ezpz"

[dependencies]
anyhow = "1.0.100"
clap = { version = "4.5.45", features = ["derive"] }
colored = "3.0.0"
ezpz = { path = "../ezpz", features = ["unstable-exhaustive"] }
libm = "0.2.15"

[dependencies.plotters]
version = "0.3.7"
default-features = false
features = ["bitmap_backend", "point_series", "line_series", "bitmap_encoder", "ttf"] 
