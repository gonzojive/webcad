<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebCAD 2D Sketcher POC</title>
    <!-- Modern Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --sidebar-bg: #f1f5f9;
            --canvas-bg: #ffffff;
            --border-color: #cbd5e1;
            --text-color: #0f172a;
            --text-muted: #64748b;
            --accent-color: #1a73e8;
            --accent-hover: #1557b0;
            --success-color: #16a34a;
            --warning-color: #d97706;
            --danger-color: #dc2626;
            --grid-color: rgba(203, 213, 225, 0.4);
            --glass-bg: rgba(241, 245, 249, 0.85);
            --font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <app-root>Loading WebCAD Sketcher...</app-root>

    <!-- Load Konva.js via CDN -->
    <script src="https://unpkg.com/konva@9.3.15/konva.min.js"></script>
    <script src="/ui/wasm_exec.js"></script>
    <!-- Entry Module script -->
    <script type="module" src="/ui/bundle.js"></script>
</body>
</html>
